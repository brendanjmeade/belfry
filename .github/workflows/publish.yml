name: Publish to PyPI

# Publishes a release to PyPI whenever a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret is stored.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Verify the tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python -c 'import belfry; print(belfry.__version__)')"
          echo "tag=$TAG  package=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match version $VER — bump src/belfry/__init__.py before tagging."
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
